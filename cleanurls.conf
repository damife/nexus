# Nginx Configuration for SwiftNexus Enterprise
# Clean URLs + Static Files + Node.js Proxy

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log;

    # Basic settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # Upstream Node.js backend
    upstream backend {
        server localhost:5000;
        keepalive 32;
    }

    # Upstream React frontend
    upstream frontend {
        server localhost:3000;
        keepalive 32;
    }

    # Main server block
    server {
        listen 80;
        listen [::]:80;  # IPv6
        server_name _;
        root /var/www/swiftnexus;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' https://cdn.jsdelivr.net;" always;

        # Rate limiting
        limit_req zone=one burst=20 nodelay;

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf|zip)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # Main location - Clean URLs
        location / {
            try_files $uri $uri/ @clean_urls;
        }

        # Clean URL rewriting
        location @clean_urls {
            # React app routes (highest priority)
            rewrite ^/login$ /login break;
            rewrite ^/admin(.*)$ /admin$1 break;
            rewrite ^/user(.*)$ /user$1 break;

            # API routes
            rewrite ^/api/(.*)$ /api/$1 break;

            # Company pages
            rewrite ^/careers$ /pages/company/careers.html last;
            rewrite ^/news$ /pages/company/news.html last;
            rewrite ^/contact$ /pages/company/contact.html last;
            rewrite ^/about$ /pages/company/about.html last;
            rewrite ^/leadership$ /pages/company/leadership.html last;
            rewrite ^/partners$ /pages/company/partners.html last;
            rewrite ^/request-demo$ /pages/company/request-demo.html last;

            # Product pages
            rewrite ^/products?$ /pages/products/index.html last;
            rewrite ^/products/(.*)$ /pages/products/$1.html last;

            # Solution pages
            rewrite ^/solutions?$ /pages/solutions/index.html last;
            rewrite ^/solutions/(.*)$ /pages/solutions/$1.html last;

            # Resource pages
            rewrite ^/resources?$ /pages/resources/index.html last;
            rewrite ^/resources/(.*)$ /pages/resources/$1.html last;

            # Legal pages
            rewrite ^/legal?$ /pages/legal/index.html last;
            rewrite ^/legal/(.*)$ /pages/legal/$1.html last;

            # General rule: add .html if file exists
            rewrite ^(.*)$ $1.html last;
        }

        # Node.js API proxy
        location /api {
            limit_req zone=one burst=50 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }

        # React app proxy
        location /login {
            limit_req zone=one burst=30 nodelay;
            
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-ForwardedProto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
        }

        location /admin {
            limit_req zone=one burst=30 nodelay;
            
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-ForwardedProto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
        }

        location /user {
            limit_req zone=one burst=30 nodelay;
            
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-ForwardedProto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy";
            add_header Content-Type text/plain;
        }

        # Error pages
        error_page 404 /pages/error/404.html;
        error_page 500 502 503 504 /pages/error/500.html;
    }

    # HTTPS server (uncomment and configure for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com www.yourdomain.com;
    #     root /var/www/swiftnexus;
    #     index index.html;
    #
    #     ssl_certificate /path/to/your/certificate.crt;
    #     ssl_certificate_key /path/to/your/private.key;
