# SwiftNexus Enterprise - Pure Reverse Proxy (NO file lookups)
server {
    listen 80;
    server_name swiftnexus.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name swiftnexus.org;

    # SSL
    ssl_certificate /etc/letsencrypt/live/swiftnexus.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swiftnexus.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # IMPORTANT:
    # - Marketing site (static pages) can stay on the frontend (3001)
    # - SPA routes (/install, /swiftadmin/*, /admin/*, /user/*) MUST go to backend (5000),
    #   otherwise they fall back to homepage on the marketing frontend.
    # - /secure/* MUST go to backend so login can load /secure/secure.js

    # React app assets (from dist when SPA is served by backend)
    location /assets/ {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # SPA routes -> backend (serves React app via server.js fallback)
    location ~ ^/(install|swiftadmin|admin|user)(/|$) {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Secure static script for login
    location /secure/ {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Frontend - Pure Proxy to Vite (NO try_files!)
    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api {
        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
