# SwiftNexus Enterprise - Redis Configuration
# Production-ready Redis configuration

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Security
requirepass redis_secure_password_2024
# Comment out the above line for local development without password

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# AOF (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""

# Client Configuration
timeout 300
tcp-keepalive 300
tcp-backlog 511

# Performance
databases 16
always-show-logo yes

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Memory Optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000

# Security Settings
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN_2024
rename-command DEBUG ""

# Client Output Buffer Limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Notification (for keyspace events)
notify-keyspace-events "Ex"

# Other Settings
rdbcompression yes
rdbchecksum yes
supervised no
pidfile /var/run/redis_6379.pid
dir /data
