# SwiftNexus Enterprise - RabbitMQ Configuration
# Production-ready RabbitMQ configuration

# Cluster Configuration
cluster_formation.discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@swiftnexus-queue

# Memory Management
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk Space Management
disk_free_limit.absolute = 1GB

# Heartbeat
heartbeat = 60

# Connection Limits
max_frame_size = 131072
channel_max = 2048
max_message_size = 134217728

# Authentication
auth_mechanisms.1 = PLAIN
auth_mechanisms.2 = AMQPLAIN
auth_mechanisms.3 = EXTERNAL

# Management Plugin
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0
management.ssl.port = 15671

# Logging
log.file.level = info
log.console.level = info
log.console = true

# Security
default_user = swiftnexus
default_pass = rabbitmq_secure_password_2024
default_user_tags.administrator = true
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# Networking
listeners.tcp.default = 5672
listeners.ssl.default = none

# SSL (uncomment for production with SSL)
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/rabbitmq/ssl/ca_certificate.pem
# ssl_options.certfile = /etc/rabbitmq/ssl/server_certificate.pem
# ssl_options.keyfile = /etc/rabbitmq/ssl/server_key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = true

# Federation (if needed)
# federation_upstream = my-upstream
# federation_upstream.my-upstream.uri = amqp://guest:guest@remote-host:5672/%2f
# federation_upstream.my-upstream.exchange = my-exchange

# Shovel (if needed)
# shovel = my-shovel
# shovel.my-shovel.src-uri = amqp://guest:guest@remote-host:5672/%2f
# shovel.my-shovel.dest-uri = amqp://guest:guest@localhost:5672/%2f
# shovel.my-shovel.src-exchange = my-exchange
# shovel.my-shovel.dest-exchange = my-exchange

# MQTT (if needed)
# mqtt.listeners.tcp.default = 1883
# mqtt.listeners.ssl.default = 8883

# STOMP (if needed)
# stomp.listeners.tcp.default = 61613
# stomp.listeners.ssl.default = 61614

# Web STOMP (if needed)
# web_stomp.tcp.port = 15674
# web_stomp.tcp.ip = 0.0.0.0
# web_stomp.ssl.port = 15675

# Prometheus Plugin (if needed)
# prometheus.tcp.port = 15692
# prometheus.tcp.ip = 0.0.0.0
